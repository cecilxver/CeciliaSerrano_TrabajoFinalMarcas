<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo Final Marcas - Cecilia Serrano</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.png" >
    <script src="script.js" defer></script>

</head>
<body>
<button onclick="cargarSeries()" id="btn-series">
    Ver series
</button>

<div id="resultado" class="container"></div>

<button onclick="cargarActores()" id="btn-actores">
    Ver actores
</button>

<div id="resultadoPersonajes" class="container"></div>

<div id="GeneroContainer" class="container"></div>
<section>
    <form  id="formulario">
    <label for="titulo">Titulo: </label>
    <input type="text" name="titulo" id="titulo" >
    <label for="genero">Género: </label>
    <input type="text" name="genero" id="genero" >
    <label for="temporadas">Nº de temporadas: </label>
    <input type="number" name="temporadas" id="temporadas">
    <label for="plataforma">Plataforma:</label>
    <input type="text" name="plataforma" id="plataforma">
    <label for="estreno">Año de estreno:</label>
    <input type="number" name="estreno" id="estreno">
    <label for="finalizada">Finalizada:</label>
    <input type="checkbox" name="finalizada" id="finalizada">
    <label for="director">Director:</label>
    <input type="text" name="director" id="director">
    <label for="actores">Actores:</label>
    <input type="text" name="actores" id="actores">
    <label for="nota">Nota:</label>
    <input type="number" name="nota" id="nota">  
    <input type="submit">
    </form>
    <input type="text"   id="b-titulo"        placeholder="Título">
<input type="text"   id="b-genero"        placeholder="Género">
<input type="text"   id="b-plataforma"    placeholder="Plataforma">
<input type="text"   id="b-director"      placeholder="Director">
<input type="text"   id="b-actor"         placeholder="Actor">
<select id="b-finalizada">
    <option value="">Todas</option>
    <option value="true">Finalizada</option>
    <option value="false">En emisión</option>
</select>
<input type="number" id="b-notaMin"       placeholder="Nota mínima">
<input type="number" id="b-notaMax"       placeholder="Nota máxima">
<input type="number" id="b-estrenoDe"     placeholder="Estreno desde">
<input type="number" id="b-estrenoHasta"  placeholder="Estreno hasta">
<input type="number" id="b-temporadasMin" placeholder="Temporadas mínimo">
<input type="number" id="b-temporadasMax" placeholder="Temporadas máximo">
<button onclick="busquedaAvanzada()">Buscar</button>
<div id="busquedaAvanzadaContainer" class="container"></div>
</section>
<br>
<br>
<br>
<form  id="formularioActor">
    <label for="Nombre">Nombre: </label>
    <input type="text" name="nombre" id="nombre" >
    <label for="edad">Edad: </label>
    <input type="number" name="edad" id="edad" >
    <label for="nacionalidad">Nacionalidad </label>
    <input type="text" name="nacionalidad" id="nacionalidad">
    <label for="serie">Serie</label>
    <input type="text" name="serie" id="serie">
    <label for="personaje">Personaje: </label>
    <input type="text" name="personaje" id="personaje">
    <input type="submit">
    </form>

<form id="formularioActualizarActor">
    <label for="id-actualizar">ID del actor a actualizar:</label>
    <input type="number" id="id-actualizar" name="id">

    <label for="nombre-actualizar">Nombre:</label>
    <input type="text" id="nombre-actualizar" name="nombre">

    <label for="edad-actualizar">Edad:</label>
    <input type="number" id="edad-actualizar" name="edad">

    <label for="nacionalidad-actualizar">Nacionalidad:</label>
    <input type="text" id="nacionalidad-actualizar" name="nacionalidad">

    <label for="serie-actualizar">Serie:</label>
    <input type="text" id="serie-actualizar" name="serie">

    <label for="personaje-actualizar">Personaje:</label>
    <input type="text" id="personaje-actualizar" name="personaje">

    <input type="submit" value="Actualizar">

</form>

<form id="formularioBorrarActor">
    <label for="id-borrar">ID del actor a borrar:</label>
    <input type="number" id="id-borrar" name="id">
    <input type="submit" value="Borrar">
</form>

<form id="formularioActualizarSerie">
    <label for="id-serie-actualizar">ID de la serie a actualizar:</label>
    <input type="number" id="id-serie-actualizar" name="id">

    <label for="titulo-actualizar">Título:</label>
    <input type="text" id="titulo-actualizar" name="titulo">

    <label for="genero-actualizar">Género:</label>
    <input type="text" id="genero-actualizar" name="genero">

    <label for="temporadas-actualizar">Temporadas:</label>
    <input type="number" id="temporadas-actualizar" name="temporadas">

    <label for="plataforma-actualizar">Plataforma:</label>
    <input type="text" id="plataforma-actualizar" name="plataforma">

    <label for="estreno-actualizar">Año de estreno:</label>
    <input type="number" id="estreno-actualizar" name="estreno">

    <label for="finalizada-actualizar">Finalizada:</label>
    <input type="checkbox" id="finalizada-actualizar" name="finalizada">

    <label for="director-actualizar">Director:</label>
    <input type="text" id="director-actualizar" name="director">

    <label for="actores-actualizar">Actores (separados por coma):</label>
    <input type="text" id="actores-actualizar" name="actores">

    <label for="nota-actualizar">Nota:</label>
    <input type="number" id="nota-actualizar" name="nota" step="0.1" min="0" max="10">

    <input type="submit" value="Actualizar">
</form>
<form id="formularioBorrarSerie">
    <label for="id-serie-borrar">ID de la serie a borrar:</label>
    <input type="number" id="id-serie-borrar" name="id">
    <input type="submit" value="Borrar">
</form>

<form id="formularioActoresOrden">
    <label for="orden">Ordenar actores por nombre:</label>
    <select id="orden" name="orden">
        <option value="asc">Ascendente (A→Z)</option>
        <option value="desc">Descendente (Z→A)</option>
    </select>
    <input type="submit" value="Ordenar">
</form>
<form id="formularioMaximaNota">
    <input type="submit" value="Calcular máxima nota">
</form>
<div id="resultadoMaximaNota"></div>
<form id="formularioRanking">
    <label for="n">Número de series del ranking:</label>
    <input type="number" id="n" name="n" min="1">
    <input type="submit" value="Ver ranking">
</form>
<div id="resultadoRanking"></div>
<form id="formularioTotalActores">
    <input type="submit" value="Ver total de actores">
</form>
<div id="resultadoTotalActores"></div>
</body>
<form id="formularioSeriesPorGenero">
    <input type="submit" value="Ver series por género">
</form>
<div id="resultadoSeriesPorGenero"></div>
</html>
